name: Zhiku public adapter

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-adapter:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout public adapter
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Read pinned canonical commit
        id: source
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path("governance-source.json").read_text(encoding="utf-8"))
          commit = str(manifest.get("canonical_commit") or "")
          if len(commit) != 40 or any(ch not in "0123456789abcdef" for ch in commit.lower()):
              raise SystemExit("invalid canonical_commit")
          if manifest.get("generated_projection") is not True or manifest.get("manual_edits_forbidden") is not True:
              raise SystemExit("public adapter is not marked as generated-only")
          if not str(manifest.get("release_id") or "").startswith("zkr-"):
              raise SystemExit("release_id missing from public projection")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"commit={commit.lower()}\n")
          PY
      - name: Checkout pinned private canonical source
        uses: actions/checkout@v4
        with:
          repository: moonstachain/yuanli-os-starter
          ref: ${{ steps.source.outputs.commit }}
          ssh-key: ${{ secrets.ZHIKU_CORE_DEPLOY_KEY }}
          path: canonical
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Rebuild the pinned one-source release
        run: |
          python canonical/systems/zhiku/release/zhiku_release.py prepare
          mkdir -p "$RUNNER_TEMP/expected"
          git -C "$RUNNER_TEMP/expected" init
          python canonical/systems/zhiku/release/zhiku_release.py project \
            --target public-skill --destination "$RUNNER_TEMP/expected"
      - name: Compare the exact generated public adapter
        run: |
          diff -ru --exclude=.git --exclude=canonical . "$RUNNER_TEMP/expected"
      - name: Prove governed installer accepts valid bytes and rejects tampering
        run: |
          home="$RUNNER_TEMP/home"
          mkdir -p "$home"
          HOME="$home" ZHIKU_SKILL_BASE="file://$RUNNER_TEMP/expected" \
            ZHIKU_INSTALL_TARGET=both bash "$RUNNER_TEMP/expected/install.sh"
          test -x "$home/.codex/skills/zhiku-market/scripts/zhiku"
          test -x "$home/.claude/skills/zhiku-market/scripts/zhiku"
          cp -R "$RUNNER_TEMP/expected" "$RUNNER_TEMP/tampered"
          printf '\n# tampered\n' >> "$RUNNER_TEMP/tampered/SKILL.md"
          if HOME="$RUNNER_TEMP/rejected" ZHIKU_SKILL_BASE="file://$RUNNER_TEMP/tampered" \
            ZHIKU_INSTALL_TARGET=codex bash "$RUNNER_TEMP/expected/install.sh"; then
            echo "tampered adapter was accepted" >&2
            exit 1
          fi
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
